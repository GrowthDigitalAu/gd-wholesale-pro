query RunInput {
  cart {
    attribute(key: "gd_b2b_checkout_retail") {
      value
    }
    buyerIdentity {
      customer {
        hasAnyTag(tags: ["B2B_approved"])
      }
    }
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          metafield(namespace: "$app", key: "gd_b2b_price") {
            value
          }
          minQtyMetafield: metafield(namespace: "$app", key: "gd_b2b_min_qty") {
            value
          }
        }
      }
    }
  }
}
